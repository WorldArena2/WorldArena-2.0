defaults:
  - env/wan_robotwin_adjust_bottle_http@env.train
  - env/robotwin_adjust_bottle@env.eval
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: 0-0

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "wan_robotwin_adjust_bottle_http_grpo_openpi_pi05"
    logger_backends: ["tensorboard"]

  max_epochs: 1
  max_steps: -1

  only_eval: False
  val_check_interval: -1
  save_interval: 1000

  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 2
  rollout_epoch: 1
  eval_rollout_epoch: 0

  reward_type: action_level
  logprob_type: token_level
  entropy_type: token_level

  adv_type: grpo
  loss_type: actor
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.28
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  reward_coef: 5.0

  sampling_params:
    do_sample: True
    temperature_train: 1.6
    temperature_eval: 1.6
    top_k: -1
    top_p: 1.0
    repetition_penalty: 1.0

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

  filter_rewards: False
  rewards_lower_bound: 0.5
  rewards_upper_bound: 4.5

env:
  group_name: "EnvGroup"

  train:
    total_num_envs: 2
    group_size: ${algorithm.group_size}
    max_episode_steps: 8
    max_steps_per_rollout_epoch: 8
    reward_coef: ${algorithm.reward_coef}
    reset_gripper_open: False
    wan_wm_hf_ckpt_path: ${oc.env:WAN_ROBOTWIN_ADJUST_BOTTLE_CKPT,/path/to/RLinf-Wan-RobotWin-AdjustBottle}
    enable_offload: False
    num_inference_steps: 5
    enable_kir: False
    http:
      server_url: http://127.0.0.1:18080
      timeout: 600.0
  eval:
    total_num_envs: 1
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 8
    max_steps_per_rollout_epoch: 8
    group_size: 1
    reset_gripper_open: True
    is_eval: True
    assets_path: "/path/to/robotwin_assets"
    seeds_path: ${oc.env:REPO_PATH}/rlinf/envs/robotwin/seeds/eval_seeds.json
    center_crop: False
    video_cfg:
      save_video: False
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1

  model:
    model_path: ${actor.model.model_path}
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 1
  global_batch_size: 2
  seed: 1234
  enable_offload: False

  model:
    model_path: ${oc.env:OPENPI_CKPT_PATH,/path/to/openpi-checkpoint}
    num_action_chunks: 8
    action_dim: 14
    add_value_head: True
    num_steps: 5
    openpi:
      config_name: "pi05_aloha_robotwin_head_adjust_bottle"
      num_images_in_input: 1
      noise_level: 0.3
      detach_critic_input: True
      action_chunk: 8
      action_env_dim: 14

  optim:
    lr: 2.0e-5
    value_lr: 3.0e-3
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_eps: 1.0e-05
    weight_decay: 0.01
    clip_grad: 1.0

  fsdp_config:
    strategy: "fsdp"
    gradient_checkpointing: True
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
