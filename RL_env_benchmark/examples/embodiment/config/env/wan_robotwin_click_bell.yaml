env_type: wan_wm
task_suite_name: robotwin_click_bell
wm_env_type: robotwin

total_num_envs: null

auto_reset: False
ignore_terminations: False
max_steps_per_rollout_epoch: 240
max_episode_steps: 240

use_rel_reward: True
reward_coef: 1.0

reset_gripper_open: False
is_eval: False

seed: 0
group_size: 1
use_fixed_reset_state_ids: True
use_ordered_reset_state_ids: False
specific_reset_id: null

video_cfg:
  save_video: True
  info_on_video: True
  video_base_dir: ${runner.logger.log_path}/video/train

enable_offload: False

wan_wm_hf_ckpt_path: null

VAE_path: ${env.train.wan_wm_hf_ckpt_path}/Wan2.2_VAE.pth
model_path: ${env.train.wan_wm_hf_ckpt_path}/model-00001.safetensors
initial_image_path: ${env.train.wan_wm_hf_ckpt_path}/dataset/

enable_kir: True

num_inference_steps: 5
chunk: 8
condition_frame_length: 5
image_size: [256, 256]
num_frames: 13

action_dim: 14
action_key: abs_action
print_chunk_rewards: True

reward_model:
  # Alternative reward types supported by WanEnv:
  # - RoboTwinT5CrossAttn
  # - QwenVLMProgressRewardModel
  # - LPIPSLastFrameRewardModel
  type: LPIPSLastFrameRewardModel
  lpips_net: vgg
  reward_transform: one_minus
