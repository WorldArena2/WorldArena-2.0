# GENIE world-model environment config for RobotWin adjust_bottle task.
# Pairs with: genie_robotwin_adjust_bottle_grpo_openpi_pi05.yaml
#
# GENIE pipeline:
#   encode : roboscape/genie/encode_vla_robotwin.sh  -> video.bin + action.bin (raw values)
#   train  : roboscape/genie/train_action.sh         -> STMaskGIT checkpoint
#   infer  : GenieEnv (this file)                    -> online RL rollout

env_type: genie_wm
wm_env_type: robotwin
task_suite_name: adjust_bottle

total_num_envs: null   # overridden in training config

auto_reset: False
ignore_terminations: False

use_rel_reward: True
reward_coef: 1.0

seed: 0
group_size: 1
use_fixed_reset_state_ids: True

is_eval: False

max_episode_steps: 200
max_steps_per_rollout_epoch: 200

success_reward_threshold: 0.9

# ──────────────────────────────────────────────────────────────────────
# GENIE generation parameters
# ──────────────────────────────────────────────────────────────────────
# chunk must match actor.num_action_chunks and actor.openpi.action_chunk
chunk: 8
# num_prompt_frames = number of history frames held in image_queue
num_prompt_frames: 8
# window_size = num_prompt_frames + chunk  (must be consistent)
window_size: 16         # 8 + 8

image_size: [256, 256]

# Action / state dimension for RobotWin (14-DoF absolute control)
action_dim: 14

# Spatial token grid side length output by MagViT2
latent_side_len: 16

# ──────────────────────────────────────────────────────────────────────
# Model checkpoints  (fill in actual paths before launching)
# ──────────────────────────────────────────────────────────────────────

# RoboTwin token dataset produced by encode_vla_robotwin.sh
# Expected layout:
#   <initial_image_path>/train/{video.bin, action.bin, segment_ids_total.bin, metadata.json}
#   <initial_image_path>/val/{...}
initial_image_path: /your/path//RLinf/roboscape/encoded_vla_robotwin/adjust_bottle

# STMaskGIT world-model checkpoint directory (HuggingFace-style, from train_action.sh)
# Must point to a step_N subdirectory that contains config.json + model.safetensors
genie_ckpt_path: /manifold-obs/tangyinzhou/worldarena/worldarena_env_adjust_bottle/step_310000

# GenieConfig JSON (controls T, S, action_dim, etc.)
genie_config_path: /your/path//RLinf/roboscape/genie/genie/configs/magvit_n32_h8_d512.json

# MagViT2 VQModel checkpoint (.ckpt file)
magvit2_ckpt_path: /your/path//RLinf/roboscape/genie/magvit2.ckpt

# Action normalisation statistics (optional).
# Only set if encode_vla_robotwin.sh was run with --stat_file.
# When unset (null), raw action values are used (current default).
# action_stat_file: null

# ──────────────────────────────────────────────────────────────────────
# Debug: print per-chunk reward breakdown (raw reward model output + diff reward)
print_chunk_rewards: False

# ──────────────────────────────────────────────────────────────────────
# Reward model
# ──────────────────────────────────────────────────────────────────────
reward_model:
  # 可选:
  # 1) RoboTwinT5CrossAttn           (原有cross-attn reward)
  # 2) QwenVLMProgressRewardModel    (VLM进度/置信度 reward)
  # 3) LPIPSLastFrameRewardModel     (与对应GT轨迹最后一帧的LPIPS相似度 reward)

  # ---- RoboTwinT5CrossAttn 配置 (type=RoboTwinT5CrossAttn 时生效) ----
  # type: RoboTwinT5CrossAttn
  # from_pretrained: /your/path//RLinf/logs/robotwin_reward_model_adjust_bottle/robotwin_reward_training/checkpoints/global_step_660/actor/model_state_dict/resnet_rm.pth
  # t5_model_name: /your/path//RLinf/pretrained_models/t5-base

  # ---- QwenVLMProgressRewardModel 配置 (type=QwenVLMProgressRewardModel 时生效) ----
  # local_hf: 进程内加载HF模型；
  # openai_api/vllm_service/sglang_service: 请求外部OpenAI兼容服务
  type: QwenVLMProgressRewardModel
  inference_backend: sglang_service
  model_path: "/your/path//RLinf/Qwen3.5-9B"
  openai_api_base: "http://127.0.0.1:8000/v1"
  openai_api_key: "EMPTY"
  service_model_name: "Qwen3.5-9B"
  request_timeout: 30.0
  max_retries: 2
  dtype: bfloat16
  max_new_tokens: 64
  temperature: 0.0
  response_key: score
  default_score: 0.0
  force_json_response: True
  print_vlm_response: True
  log_chunk_size: 8

  # ---- LPIPSLastFrameRewardModel 配置 (type=LPIPSLastFrameRewardModel 时生效) ----
  # type: LPIPSLastFrameRewardModel
  # lpips_net: vgg              # 可选: alex / vgg / squeeze
  # reward_transform: one_minus # one_minus / negative / raw

# ──────────────────────────────────────────────────────────────────────
# Video logging
# ──────────────────────────────────────────────────────────────────────
video_cfg:
  save_video: True
  video_base_dir: ${runner.logger.log_path}/video/train

enable_offload: False
