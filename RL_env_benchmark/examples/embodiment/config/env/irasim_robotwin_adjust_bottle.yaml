env_type: irasim_wm
task_suite_name: robotwin_adjust_bottle
wm_env_type: robotwin

total_num_envs: null

auto_reset: False
ignore_terminations: False
max_steps_per_rollout_epoch: 225
max_episode_steps: 225

use_rel_reward: True
reward_coef: 5.0

seed: 0
group_size: 1
use_fixed_reset_state_ids: True
use_ordered_reset_state_ids: False
specific_reset_id: null

video_cfg:
  save_video: True
  info_on_video: True
  video_base_dir: ${runner.logger.log_path}/video/train

enable_offload: False
print_chunk_rewards: True
success_reward_threshold: 0.9

chunk: 15
condition_frame_length: 1
num_frames: 16
image_size: [240, 320]
action_dim: 14
action_key: abs_action

task_name: adjust_bottle
default_task_description: adjust the bottle
irasim_root: /your/path/lizhuohang/IRASim
wm_ckpt_path: /your/path/lizhuohang/IRASim/results/vla_robotwin_4k_320_from_scratch/adjust_bottle/checkpoints/0102000.pt
wm_config_path: /your/path/lizhuohang/IRASim/configs/train/robotwin2/frame_ada_adjust_bottle_4k320.yaml
vae_model_path: /your/path/lizhuohang/IRASim/pretrained_models/stabilityai/stable-diffusion-xl-base-1.0
num_inference_steps: 50
guidance_scale: 1.0
train_data_dir: /your/path/lizhuohang/IRASim/robotdata/vla_robotwin_4k_320_irasim/adjust_bottle
train_data_meta: /your/path/lizhuohang/IRASim/data/vla_robotwin_4k_320_adjust_bottle_train_meta.json
val_data_meta: /your/path/lizhuohang/IRASim/data/vla_robotwin_4k_320_adjust_bottle_val_meta.json
data_mode: val
action_stat_path: /your/path/lizhuohang/IRASim/robotdata/vla_robotwin_4k_320_irasim/adjust_bottle/stat.json
enable_latent_cache: True

reward_model:
  # 可选:
  # 1) RoboTwinT5CrossAttn           (原有cross-attn reward)
  # 2) QwenVLMProgressRewardModel    (VLM进度/置信度 reward)
  # 3) LPIPSLastFrameRewardModel     (与对应GT轨迹最后一帧的LPIPS相似度 reward)

  # ---- RoboTwinT5CrossAttn 配置 (type=RoboTwinT5CrossAttn 时生效) ----
  # type: RoboTwinT5CrossAttn
  # from_pretrained: /your/path//RLinf/logs/robotwin_reward_model_adjust_bottle/robotwin_reward_training/checkpoints/global_step_660/actor/model_state_dict/resnet_rm.pth
  # t5_model_name: /your/path//RLinf/pretrained_models/t5-base

  # # ---- QwenVLMProgressRewardModel 配置 (type=QwenVLMProgressRewardModel 时生效) ----
  # # local_hf: 进程内加载HF模型；
  # # openai_api/vllm_service/sglang_service: 请求外部OpenAI兼容服务
  # type: QwenVLMProgressRewardModel
  # inference_backend: sglang_service
  # model_path: "/your/path//RLinf/Qwen3.5-9B"
  # openai_api_base: "http://127.0.0.1:8000/v1"
  # openai_api_key: "EMPTY"
  # service_model_name: "Qwen3.5-9B"
  # request_timeout: 30.0
  # max_retries: 2
  # dtype: bfloat16
  # max_new_tokens: 64
  # temperature: 0.0
  # response_key: score
  # default_score: 0.0
  # force_json_response: True
  # print_vlm_response: True
  # log_chunk_size: 8

  # ---- LPIPSLastFrameRewardModel 配置 (type=LPIPSLastFrameRewardModel 时生效) ----
  type: LPIPSLastFrameRewardModel
  lpips_net: vgg              # 可选: alex / vgg / squeeze
  reward_transform: one_minus # one_minus / negative / raw