# iVideoGPT world-model environment config for RobotWin click_bell.

env_type: ivideogpt_wm
task_suite_name: robotwin_click_bell
wm_env_type: robotwin

total_num_envs: null

auto_reset: False
ignore_terminations: False
max_steps_per_rollout_epoch: 200
max_episode_steps: 200

use_rel_reward: True
reward_coef: 5.0

seed: 0
group_size: 1
use_fixed_reset_state_ids: True
use_ordered_reset_state_ids: False
specific_reset_id: null

video_cfg:
  save_video: True
  info_on_video: True
  video_base_dir: ${runner.logger.log_path}/video/train

enable_offload: False
print_chunk_rewards: True
success_reward_threshold: 0.9

# ===== iVideoGPT world model =====
chunk: 8
condition_frame_length: 1
segment_length: 9
image_size: [256, 256]
action_dim: 14
action_key: abs_action
image_key: image

# iVideoGPT repo root (for python import)
ivideogpt_root: /your/path//RLinf/iVideoGPT

# reset data path (supports .npy episode files or .npz encoded episodes)
initial_image_path: /your/path/research_gen/tangyinzhou/RLinf/iVideoGPT/encoded_data/click_bell

# tokenizer/ + transformer/ bundle path
model_bundle_path: /your/path//RLinf/iVideoGPT/model_bundles/ivideogpt_click_bell_bundle

# generation params
do_sample: True
temperature: 1.0
top_k: 100
pad_token_id: 50256

# token layout params used by HeadModelWithAction
context_tokens_per_frame: 257
tokens_per_dyna: 16

# fallback task text when npz file has no task field
default_task_description: click the bell

reward_model:
  # 可选:
  # 1) RoboTwinT5CrossAttn           (原有cross-attn reward)
  # 2) QwenVLMProgressRewardModel    (VLM进度/置信度 reward)
  
  # ---- RoboTwinT5CrossAttn 配置 (type=RoboTwinT5CrossAttn 时生效) ----
  # type: RoboTwinT5CrossAttn
  # from_pretrained: /manifold-obs/tangyinzhou/RLinf/diffsynth-studio/RLinf-Wan-RobotWin-ClickBell/resnet_rm.pth
  # t5_model_name: /your/path//RLinf/pretrained_models/t5-base

  # ---- QwenVLMProgressRewardModel 配置 (type=QwenVLMProgressRewardModel 时生效) ----
  # local_hf: 进程内加载HF模型；
  # openai_api/vllm_service/sglang_service: 请求外部OpenAI兼容服务
  type: QwenVLMProgressRewardModel
  inference_backend: sglang_service
  model_path: "/your/path//RLinf/Qwen3.5-9B"
  openai_api_base: "http://127.0.0.1:8000/v1"
  openai_api_key: "EMPTY"
  service_model_name: "Qwen3.5-9B"
  request_timeout: 30.0
  max_retries: 2
  dtype: bfloat16
  max_new_tokens: 64
  temperature: 0.0
  response_key: score
  default_score: 0.0
  force_json_response: True
  print_vlm_response: True
  log_chunk_size: 8
