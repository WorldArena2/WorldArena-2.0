env_type: opensora_wm
task_suite_name: robotwin_click_bell
wm_env_type: robotwin

total_num_envs: null

auto_reset: False
ignore_terminations: False
max_steps_per_rollout_epoch: 240
max_episode_steps: 240

use_rel_reward: True
reward_coef: 5.0

# RobotWin 不需要特殊夹爪处理
reset_gripper_open: False
is_eval: False

seed: 0
group_size: 1
use_fixed_reset_state_ids: True
use_ordered_reset_state_ids: False
specific_reset_id: null

video_cfg:
  save_video: True
  save_images: True          # 额外保存单独的图像帧
  image_format: png          # 图片格式: png 或 jpg
  info_on_video: True
  video_base_dir: ${runner.logger.log_path}/video/train

enable_offload: False

# RobotWin 特定配置
action_dim: 14              # RobotWin 14维绝对action
action_key: abs_action      # 数据集中的action字段名
print_chunk_rewards: True   # 调试用：打印每个 chunk 每个 step 的 reward

### OpenSora params
# 以下三个组件路径各自独立（分属不同目录，不共用前缀）
opensora_wm_hf_ckpt_path: null  # 保留字段但不再使用
initial_image_path: /your/path//RLinf/opensora/RLinf-OpenSora-RobotWin-ClickBell/dataset/

world_model_cfg:
  stats_path: /manifold-obs/tangyinzhou/RLinf/opensora/robotwin_wds_click_bell/robotwin_wds_click_bell/dataset_statistics.json
  dtype: bf16

  model:
    type: "STDiT3-XL/2"
    # 已训练完成的 RobotWin STDiT3 checkpoint（step35000）
    from_pretrained: /manifold-obs/tangyinzhou/RLinf/opensora/runs/world_models_robotwin_click_bell/009-STDiT3-XL-2/009-STDiT3-XL-2/epoch0-global_step30000/model/model-00001.safetensors
    qk_norm: true
    enable_flash_attn: true
    enable_layernorm_kernel: true
    action_dim: 14            # 必须与训练时 action_dim: 14 一致
    pad_action_num: 4         # 与训练配置 train_robotwin_click_bell.yaml 一致

  vae:
    type: SDXL                # 复用 LIBERO 的 SDXL VAE（RobotWin 无需重训）
    from_pretrained: /your/path//RLinf/opensora/RLinf-OpenSora-LIBERO-Spatial/vae
    micro_frame_size: 8
    micro_batch_size: 64

  reward_model:
    # 可选:
    # 1) RoboTwinT5CrossAttn           (原有cross-attn reward)
    # 2) QwenVLMProgressRewardModel    (VLM进度/置信度 reward)
    # 3) LPIPSLastFrameRewardModel     (当前生成帧与对应GT轨迹最后一帧的LPIPS相似度 reward)

    # ---- RoboTwinT5CrossAttn 配置 (type=RoboTwinT5CrossAttn 时生效) ----
    # 复用 Wan+RobotWin 已训练的奖励模型
    # type: RoboTwinT5CrossAttn
    # from_pretrained: /manifold-obs/tangyinzhou/RLinf/diffsynth-studio/RLinf-Wan-RobotWin-ClickBell/resnet_rm.pth
    # t5_model_name: /your/path//RLinf/pretrained_models/t5-base

    # ---- QwenVLMProgressRewardModel 配置 (type=QwenVLMProgressRewardModel 时生效) ----
    # local_hf: 进程内加载HF模型；
    # openai_api/vllm_service/sglang_service: 请求外部OpenAI兼容服务
    # type: QwenVLMProgressRewardModel
    # inference_backend: sglang_service
    # model_path: "/your/path//RLinf/Qwen3.5-9B"
    # openai_api_base: "http://127.0.0.1:8000/v1"
    # openai_api_key: "EMPTY"
    # service_model_name: "Qwen3.5-9B"
    # request_timeout: 30.0
    # max_retries: 2
    # dtype: bfloat16
    # max_new_tokens: 64
    # temperature: 0.0
    # response_key: score
    # default_score: 0.0
    # force_json_response: True
    # print_vlm_response: True
    # log_chunk_size: 8

    # ---- LPIPSLastFrameRewardModel 配置 (type=LPIPSLastFrameRewardModel 时生效) ----
    type: LPIPSLastFrameRewardModel
    lpips_net: vgg              # 可选: alex / vgg / squeeze
    reward_transform: one_minus # one_minus / negative / raw

  scheduler:
    type: rflow
    use_timestep_transform: true
    sample_method: logit-normal

  chunk: 8                     # 应与 Pi05 的 action_chunk 相同
  condition_frame_length: 4    # 与训练配置 train_robotwin_click_bell.yaml 一致
  image_size: [256, 256]